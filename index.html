<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>komawari.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fafaf7;
    --ink:#161616;
    --ink-soft:#555;
    --muted:#8a8a88;
    --line:#161616;
    --idea:#5b8c3e;
    --tech:#b23a3a;
    --book:#c9a800;
    --border:1.5px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);font-family:'Zen Kaku Gothic New',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  .page{
    max-width:1120px;
    margin:0 auto;
    padding:22px 40px 80px;
  }

  /* ===== Masthead (sticky) ===== */
  .masthead{
    position:sticky;
    top:0;
    z-index:50;
    background:var(--paper);
    display:flex;align-items:baseline;justify-content:space-between;gap:20px;
    padding:18px 0;
    border-bottom: var(--border) solid var(--ink);
    margin-bottom:40px;
  }
  .brand{display:flex;align-items:baseline;gap:14px}
  .logo{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-weight:900;
    font-size:22px;
    letter-spacing:.02em;
  }
  .tagline{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
  }
  .nav{display:flex;gap:22px}
  .nav a{
    font-size:14px;font-weight:500;
    color:var(--ink-soft);
    transition:color .12s;
  }
  .nav a:hover, .nav a.active{color:var(--ink)}

  /* ===== Hero ===== */
  .hero{
    display:grid;
    grid-template-columns: 1fr 1fr;
    border:var(--border) solid var(--ink);
    margin-bottom:64px;
  }
  .hero > div{padding:36px 32px}
  .hero-intro{
    border-right:var(--border) solid var(--ink);
    position:relative;
  }
  .hero-icon{
    position:absolute;
    top:20px;right:20px;
    width:52px;height:52px;
    object-fit:cover;
    border-radius:50%;
    display:block;
  }
  .hero-intro h1{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-weight:900;
    font-size:34px;
    line-height:1.3;
    letter-spacing:.01em;
  }
  .hero-intro h1 small{
    display:block;
    font-size:13px;
    font-weight:500;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    letter-spacing:.1em;
    margin-bottom:10px;
  }
  .hero-intro .lede{
    margin-top:18px;
    font-size:15.5px;
    line-height:1.85;
    color:var(--ink-soft);
    max-width:42ch;
  }
  .hero-now h4{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;font-weight:600;
    letter-spacing:.15em;
    color:var(--muted);
    margin-bottom:16px;
  }
  .hero-now ul{list-style:none;display:flex;flex-direction:column;gap:10px}
  .hero-now li{
    display:grid;grid-template-columns: 60px 1fr;
    gap:14px;align-items:baseline;
    font-size:14.5px;line-height:1.55;
    padding-bottom:10px;
    border-bottom: 1px dashed #ddd;
  }
  .hero-now li:last-child{border-bottom:none;padding-bottom:0}
  .hero-now li .k{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:.1em;
  }

  /* ===== Latest strip (最新記事への動線) ===== */
  .latest-strip{
    display:grid;
    grid-template-columns: auto auto 1fr auto auto;
    align-items:center;gap:18px;
    border-top:1px solid var(--ink);
    border-bottom:1px solid var(--ink);
    padding:10px 16px;
    margin:-32px 0 48px;
    background:transparent;
    font-family:'Zen Kaku Gothic New',sans-serif;
    text-align:left;
    width:100%;
    transition: background .12s;
  }
  .latest-strip:hover{background:#f3efe4}
  .latest-strip .label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.2em;color:var(--muted);
    white-space:nowrap;
  }
  .latest-strip .cat-tag{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.08em;
    color:var(--ink-soft);
  }
  .latest-strip .cat-tag .dot{width:7px;height:7px;border-radius:50%}
  .latest-strip[data-cat="idea"] .cat-tag .dot{background:var(--idea)}
  .latest-strip[data-cat="tech"] .cat-tag .dot{background:var(--tech)}
  .latest-strip[data-cat="book"] .cat-tag .dot{background:var(--book)}
  .latest-strip h4{
    font-weight:500;font-size:15px;line-height:1.5;
    color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .latest-strip .date{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;color:var(--muted);letter-spacing:.04em;
    white-space:nowrap;
  }
  .latest-strip .arrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--ink);
  }

  /* ===== Section head ===== */
  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin: 0 0 24px;
  }
  .section-head h2{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-weight:900;
    font-size:22px;
    letter-spacing:.02em;
  }
  .section-head h2 .sub{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    font-weight:500;
    color:var(--muted);
    letter-spacing:.15em;
    margin-right:10px;
  }
  .section-head .count{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--muted);
  }

  /* ===== Filter ===== */
  .filter-bar{
    display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    margin-bottom:24px;
    padding-bottom:16px;
    border-bottom: var(--border) solid var(--ink);
  }
  .cat-btn{
    font-size:14px;
    font-weight:500;
    padding:5px 12px;
    border:var(--border) solid var(--ink);
    background:transparent;
    color:var(--ink);
    display:inline-flex;align-items:center;gap:8px;
    transition: background .12s, color .12s;
  }
  .cat-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--ink)}
  .cat-btn[data-k="idea"] .dot{background:var(--idea)}
  .cat-btn[data-k="tech"] .dot{background:var(--tech)}
  .cat-btn[data-k="book"] .dot{background:var(--book)}
  .cat-btn .n{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
  .cat-btn.active{background:var(--ink);color:var(--paper)}
  .cat-btn.active .n{color:#aaa}
  .cat-btn:hover:not(.active){background:#f0ede5}

  .search-wrap{
    margin-left:auto;
    display:flex;align-items:center;gap:8px;
    border:var(--border) solid var(--ink);
    padding:5px 12px;
    min-width:200px;
  }
  .search-wrap input{
    border:none;background:transparent;outline:none;
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-size:14px;width:100%;
  }
  .search-wrap .ico{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}

  /* ===== Blog grid — 漫画のコマ割り ===== */
  .blog-grid{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    grid-auto-rows: 100px;
    grid-auto-flow: dense;
    border:var(--border) solid var(--ink);
  }
  .post{
    border-right: var(--border) solid var(--ink);
    border-bottom: var(--border) solid var(--ink);
    padding:20px 22px;
    display:flex;flex-direction:column;
    position:relative;
    text-align:left;
    width:100%;
    background:transparent;
    transition: background .12s;
    overflow:hidden;
  }
  .post .excerpt{
    min-height:0;
  }
  .post:hover{background:#f3efe4}
  /* remove outer edges so outer frame doubles up cleanly */
  .post.edge-r{border-right:none}
  .post.edge-b{border-bottom:none}

  .post .meta-top{
    display:flex;align-items:center;justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:.08em;
    margin-bottom:12px;
  }
  .post .cat-tag{
    display:inline-flex;align-items:center;gap:6px;
    color:var(--ink);
    font-weight:500;
  }
  .post .cat-tag .dot{width:7px;height:7px;border-radius:50%}
  .post[data-cat="idea"] .cat-tag .dot{background:var(--idea)}
  .post[data-cat="tech"] .cat-tag .dot{background:var(--tech)}
  .post[data-cat="book"] .cat-tag .dot{background:var(--book)}

  .post h3{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-weight:700;
    line-height:1.45;
    letter-spacing:.005em;
  }
  .post .excerpt{
    font-size:14.5px;line-height:1.75;
    color:var(--ink-soft);
    margin-top:10px;
    flex:1;
  }
  .post .foot{
    margin-top:14px;
    display:flex;align-items:center;justify-content:space-between;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
  }
  .post .foot .tags{display:flex;gap:10px;flex-wrap:wrap}
  .post .foot .read{color:var(--ink);font-weight:500}

  /* Varied panel sizes — コマ割り (always fills 6-col rows) */
  .post.s-hero{ grid-column: span 4; grid-row: span 3; padding:30px 30px; }
  .post.s-hero h3{font-size:24px}
  .post.s-hero .excerpt{font-size:15.5px;max-width:44ch}

  /* s-hero に画像が設定されている場合は右側の余白に画像を控えめに表示 */
  .post.s-hero.has-hero-img{ overflow:hidden; }
  /* タイトル・本文だけを画像と重ならないように制限（meta-top と foot は全幅のまま） */
  .post.s-hero.has-hero-img h3,
  .post.s-hero.has-hero-img .excerpt{
    max-width:calc(72% - 20px);
    position:relative;
    z-index:1;
  }
  .post.s-hero .hero-img{
    position:absolute;
    right:11%;
    top:86px;      /* meta-top (日付) の下 */
    width:22%;
    max-width:140px;
    aspect-ratio:1 / 1;
    overflow:hidden;
    pointer-events:none;
    opacity:.7;
    mix-blend-mode:multiply;
    -webkit-mask-image: radial-gradient(ellipse at center, #000 25%, transparent 88%);
            mask-image: radial-gradient(ellipse at center, #000 25%, transparent 88%);
  }
  .post.s-hero .hero-img img{
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .post.s-tall{ grid-column: span 2; grid-row: span 3; }
  .post.s-tall h3{font-size:17px}
  .post.s-wide{ grid-column: span 3; grid-row: span 2; }
  .post.s-wide h3{font-size:17px}
  .post.s-wide-lg{ grid-column: span 4; grid-row: span 2; }
  .post.s-wide-lg h3{font-size:18px}
  .post.s-full{ grid-column: span 6; grid-row: span 2; padding:28px 30px; }
  .post.s-full h3{font-size:20px}
  .post.s-full .excerpt{font-size:15.5px;max-width:72ch}
  .post.s-sq{ grid-column: span 2; grid-row: span 2; }
  .post.s-sq h3{font-size:16px}
  .post.s-sm{ grid-column: span 2; grid-row: span 2; }
  .post.s-sm h3{font-size:16px}

  /* When filtered by category or search — uniform grid so rows still fill */
  .blog-grid.uniform .post{
    grid-column: span 2 !important;
    grid-row: span 2 !important;
    padding:18px 20px !important;
    overflow:hidden !important;
  }
  .blog-grid.uniform .post h3{
    font-size:15px !important;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .blog-grid.uniform .post .excerpt{
    font-size:13.5px !important;
    max-width:none !important;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .blog-grid.uniform .post .meta-top{margin-bottom:8px}
  .blog-grid.uniform .post .foot{margin-top:10px}
  /* uniform 表示時は hero 画像を非表示 */
  .blog-grid.uniform .post.s-hero.has-hero-img .hero-img{display:none}
  .blog-grid.uniform .post.s-hero.has-hero-img .meta-top,
  .blog-grid.uniform .post.s-hero.has-hero-img h3,
  .blog-grid.uniform .post.s-hero.has-hero-img .excerpt,
  .blog-grid.uniform .post.s-hero.has-hero-img .foot{max-width:none}

  .post.hidden{display:none}

  /* ===== Empty state ===== */
  .empty{
    grid-column: 1 / -1;
    grid-row: span 4;
    padding:80px 30px;
    text-align:center;
    border-right:none;border-bottom:none;
  }
  .empty .b{font-size:18px;font-weight:700}
  .empty .s{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:8px;color:var(--muted)}

  /* ===== Works ===== */
  .works{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    border:var(--border) solid var(--ink);
    margin-top:64px;
  }
  .work{
    padding:18px;
    border-right:var(--border) solid var(--ink);
    border-bottom:var(--border) solid var(--ink);
    display:flex;flex-direction:column;gap:12px;
    cursor:pointer;
    transition:background .12s;
  }
  .work:hover{background:#f5f1e6}
  /* 4 列グリッド（デスクトップ）での境界線処理 */
  @media (min-width: 769px){
    /* 最右列（4列目）は右線を消す */
    .works .work:nth-child(4n){border-right:none}
    /* 最終要素も右線なし（最終行が4列に満たない場合の予備） */
    .works .work:last-child{border-right:none}
    /* 最後の行（満杯に並んだ場合の行の先頭とそれ以降）は下線を消す */
    .works .work:nth-last-child(-n+4):nth-child(4n+1),
    .works .work:nth-last-child(-n+4):nth-child(4n+1) ~ .work{border-bottom:none}
  }
  .work .thumb{
    aspect-ratio: 4/3;
    border:var(--border) solid var(--ink);
    background:
      repeating-linear-gradient(45deg, rgba(20,20,20,.06) 0 1px, transparent 1px 8px);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--muted);
    text-align:center;padding:10px;
    position:relative;overflow:hidden;
  }
  .work .thumb img{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .work h4{font-weight:700;font-size:15.5px;line-height:1.4}
  .work .meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
  /* Work modal */
  .modal .m-work-meta{
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);
    margin-top:8px;display:flex;gap:16px;flex-wrap:wrap;
  }
  .modal .m-work-url{
    display:inline-flex;align-items:center;gap:5px;
    margin-top:16px;font-size:13px;font-weight:600;
    border-bottom:1.5px solid var(--ink);padding-bottom:1px;
    color:var(--ink);
  }
  .modal .m-work-url:hover{color:var(--ink-soft)}

  /* ===== Footer ===== */
  .foot-panel{
    margin-top:64px;
    padding-top:24px;
    border-top: var(--border) solid var(--ink);
    display:flex;justify-content:space-between;align-items:center;gap:20px;
    flex-wrap:wrap;
  }
  .foot-panel .links{display:flex;gap:18px;flex-wrap:wrap}
  .foot-panel .links a{
    font-size:14px;
    color:var(--ink-soft);
  }
  .foot-panel .links a:hover{color:var(--ink)}
  .foot-panel .copy{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--muted);
  }

  /* ===== Timeline (simple) ===== */
  .timeline{
    border:var(--border) solid var(--ink);
    margin-top:0;
  }
  .tl-group{
    border-bottom:var(--border) solid var(--ink);
  }
  .tl-group:last-child{border-bottom:none}
  .tl-group-head{
    padding:14px 22px;
    background:#f5f1e6;
    border-bottom:1px solid var(--ink);
    display:flex;align-items:baseline;gap:14px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.2em;color:var(--muted);
  }
  .tl-group-head .t{
    font-family:'Zen Kaku Gothic New',sans-serif;
    font-weight:700;font-size:13px;
    color:var(--ink);letter-spacing:.02em;
  }
  .tl-row{
    display:grid;
    grid-template-columns: 120px 1fr 80px;
    align-items:baseline;
    padding:18px 22px;
    border-bottom:1px dashed #ddd;
    gap:20px;
  }
  .tl-row:last-child{border-bottom:none}
  .tl-row .when{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--muted);letter-spacing:.08em;
  }
  .tl-row .when .y{color:var(--ink);font-weight:600;font-size:12px;margin-right:6px}
  .tl-row .main h4{
    font-weight:700;font-size:16.5px;line-height:1.5;
    margin-bottom:4px;
  }
  .tl-row .main .role{
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;color:var(--ink-soft);letter-spacing:.05em;
  }
  .tl-row .main .role .co{color:var(--ink);font-weight:600}
  .tl-row .pg{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--muted);letter-spacing:.12em;
    text-align:right;
  }

  /* ===== Modal ===== */
  .modal-bg{
    position:fixed;inset:0;background:rgba(20,20,20,.4);
    display:none;align-items:center;justify-content:center;
    z-index:200;padding:30px;
  }
  .modal-bg.open{display:flex}
  .modal{
    background:var(--paper);
    border:var(--border) solid var(--ink);
    max-width:640px;width:100%;max-height:90vh;overflow:auto;
    padding:40px 44px;
    position:relative;
  }
  /* PC ではモーダルを広めに / 文字も大きめに */
  @media (min-width: 901px){
    .modal{ max-width: 1000px; padding: 56px 72px; }
    .modal h2{ font-size: 36px; }
    .modal .m-cat{ font-size: 13px; }
    .modal .m-meta{ font-size: 13px; }
    .modal .m-body{ font-size: 19px; line-height: 2.0; }
    .modal .m-body h1{ font-size: 28px; }
    .modal .m-body h2{ font-size: 24px; }
    .modal .m-body h3{ font-size: 20px; }
    .modal .m-body code{ font-size: 14px; }
  }
  .modal .close{
    position:absolute;top:16px;right:16px;
    font-size:16px;color:var(--muted);
  }
  .modal .close:hover{color:var(--ink)}
  .modal .m-cat{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;letter-spacing:.1em;
    margin-bottom:14px;color:var(--ink-soft);
  }
  .modal .m-cat .dot{width:7px;height:7px;border-radius:50%}
  .modal .m-cat[data-cat="idea"] .dot{background:var(--idea)}
  .modal .m-cat[data-cat="tech"] .dot{background:var(--tech)}
  .modal .m-cat[data-cat="book"] .dot{background:var(--book)}
  .modal h2{font-weight:900;font-size:30px;line-height:1.35}
  .modal .m-meta{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--muted);margin-top:10px;display:flex;gap:16px;flex-wrap:wrap}
  .modal .m-img{
    margin:20px 0 0;
    overflow:hidden;
  }
  .modal .m-img img{
    display:block;
    width:auto;
    height:auto;
    max-width:100%;
    max-height:42vh;
    margin:0 auto;
  }
  .modal .m-body{margin-top:22px;font-size:17.5px;line-height:1.95;color:var(--ink-soft)}
  .modal .m-body p{margin-bottom:14px}
  .modal .m-body h1,.modal .m-body h2,.modal .m-body h3,.modal .m-body h4{font-weight:700;margin:22px 0 10px;color:var(--ink)}
  .modal .m-body h1{font-size:23px}.modal .m-body h2{font-size:21px}.modal .m-body h3{font-size:19px}
  .modal .m-body ul,.modal .m-body ol{margin:0 0 14px 22px}
  .modal .m-body li{margin-bottom:5px}
  .modal .m-body code{font-family:'JetBrains Mono',monospace;font-size:13.5px;background:#f0ede5;padding:1px 5px}
  .modal .m-body pre{background:#f0ede5;padding:14px;margin-bottom:12px;overflow-x:auto}
  .modal .m-body pre code{background:none;padding:0}
  .modal .m-body blockquote{border-left:3px solid var(--muted);padding-left:14px;color:var(--ink-soft);margin-bottom:12px}
  .modal .m-body a{text-decoration:underline}
  .modal .m-body strong{font-weight:700}
  .modal .m-body em{font-style:italic}
  .modal .m-body hr{border:none;border-top:1px solid #ddd;margin:16px 0}

  /* ===== Post image badge ===== */
  .post .img-badge{
    font-family:'JetBrains Mono',monospace;
    font-size:9px;letter-spacing:.06em;
    color:var(--muted);
    border:1px solid #ccc;
    padding:1px 5px;
    line-height:1.4;
  }

  @media (max-width: 900px){
    .page{padding:28px 20px 60px}
    .masthead{flex-direction:column;align-items:flex-start;gap:14px}
    .nav{gap:16px;flex-wrap:wrap}
    .hero{grid-template-columns:1fr}
    .hero > div{padding:28px 22px}
    .hero-intro{border-right:none;border-bottom:var(--border) solid var(--ink)}
    .hero-intro h1{font-size:26px}
    .hero-now li{grid-template-columns:50px 1fr;gap:10px;font-size:12.5px}

    .section-head{flex-wrap:wrap;gap:8px;margin-bottom:18px}
    .section-head h2{font-size:18px}
    .section-head h2 .sub{display:block;margin-bottom:4px;margin-right:0}

    /* Latest strip */
    .latest-strip{
      grid-template-columns:auto 1fr auto;
      gap:12px;padding:10px 14px;margin:-16px 0 32px;
    }
    .latest-strip .label{display:none}
    .latest-strip .date{font-size:11px}
    .latest-strip h4{font-size:14px}

    .filter-bar{gap:6px}
    .search-wrap{margin-left:0;min-width:0;flex:1 1 100%;order:10}
    .cat-btn{font-size:13px;padding:4px 10px}

    /* Blog grid: 2-column, all posts uniform square-ish, source order preserved */
    .blog-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:auto;grid-auto-flow:row}
    .blog-grid .post,
    .blog-grid.uniform .post{
      grid-column:span 1 !important;
      grid-row:auto !important;
      padding:18px 18px !important;
      min-height:180px;
      border-right:var(--border) solid var(--ink);
      border-bottom:var(--border) solid var(--ink);
    }
    /* remove right border on every 2nd cell so outer frame doubles cleanly */
    .blog-grid .post:nth-child(2n){border-right:none}
    .post.s-hero h3,
    .blog-grid .post h3,
    .blog-grid.uniform .post h3{font-size:16px !important}
    .post.s-hero .excerpt,
    .blog-grid .post .excerpt{font-size:14px !important;max-width:none !important}
    .post .foot .tags{gap:6px}
    /* reset edge helpers at small size — we control borders above */
    .post.edge-r{border-right:var(--border) solid var(--ink)}
    .post.edge-b{border-bottom:var(--border) solid var(--ink)}

    /* モバイルでは s-hero の右側画像は非表示 */
    .post.s-hero.has-hero-img .hero-img{display:none}
    .post.s-hero.has-hero-img .meta-top,
    .post.s-hero.has-hero-img h3,
    .post.s-hero.has-hero-img .excerpt,
    .post.s-hero.has-hero-img .foot{max-width:none}

    .empty{grid-column:1 / -1 !important;padding:50px 20px}

    .works{grid-template-columns:repeat(2,1fr)}
    .works .work{border-right:var(--border) solid var(--ink);border-bottom:var(--border) solid var(--ink)}
    .works .work:nth-child(2n){border-right:none}
    .works .work:last-child{border-right:none}
    /* 最後の行（奇数個の余りも含む）のみ下線を消す */
    .works .work:nth-last-child(-n+2):nth-child(2n+1),
    .works .work:nth-last-child(-n+2):nth-child(2n+1) ~ .work{border-bottom:none}

    .foot-panel{flex-direction:column;align-items:flex-start;gap:12px}

    /* Timeline */
    .tl-row{grid-template-columns:100px 1fr 60px;gap:14px;padding:14px 18px}
    .tl-row .main h4{font-size:15.5px}
    .tl-group-head{padding:10px 18px}

    .modal-bg{padding:16px}
    .modal{padding:28px 22px}
    .modal h2{font-size:24px;line-height:1.4}
    .modal .m-cat{font-size:12px}
    .modal .m-meta{font-size:12px}
    .modal .m-body{font-size:16px;line-height:1.85}
    .modal .m-body h1{font-size:21px}
    .modal .m-body h2{font-size:19px}
    .modal .m-body h3{font-size:17px}
    .modal .m-body code{font-size:13px}
  }

  @media (max-width: 560px){
    .page{padding:22px 14px 48px}
    .hero-intro h1{font-size:22px}
    .hero-intro .lede{font-size:14.5px}

    /* Latest strip: single column stack */
    .latest-strip{
      grid-template-columns:auto 1fr;
      gap:8px 12px;
    }
    .latest-strip .cat-tag{grid-column:1}
    .latest-strip .date{grid-column:2;text-align:right}
    .latest-strip h4{grid-column:1 / -1;white-space:normal;font-size:14.5px}
    .latest-strip .arrow{display:none}

    /* Blog grid: single column at phone size */
    .blog-grid{grid-template-columns:1fr}
    .blog-grid .post,
    .blog-grid.uniform .post{
      grid-column:span 1 !important;
      border-right:none !important;
      min-height:0;
      padding:16px 18px !important;
    }
    .blog-grid .post:last-child{border-bottom:none}

    .works{grid-template-columns:1fr}
    .works .work{border-right:none}
    /* 1 列レイアウトでは最後以外すべて下線を出す（タブレット用ルールを上書き） */
    .works .work:not(:last-child){border-bottom:var(--border) solid var(--ink)}
    .works .work:last-child{border-bottom:none}

    /* Timeline: stacked rows */
    .tl-row{
      grid-template-columns:90px 1fr;
      gap:10px;padding:12px 16px;
    }
    .tl-row .pg{display:none}
    .tl-row .main h4{font-size:13.5px}
    .tl-row .main .role{font-size:11px}

    .masthead{padding-bottom:14px;margin-bottom:28px}
    .logo{font-size:18px}
    .section-head h2{font-size:16px}

    .filter-bar{padding-bottom:12px;margin-bottom:18px}
    .cat-btn{padding:4px 8px}
    .cat-btn .n{display:none}

    /* Modal close button: 親指の届きやすい下部に固定表示 */
    .modal-bg{padding:12px 12px 0}
    .modal{
      max-height:calc(100vh - 92px);
      padding:24px 20px 28px;
    }
    .modal .close{
      position:fixed;
      top:auto;
      right:50%;
      bottom:18px;
      transform:translateX(50%);
      width:52px;height:52px;
      display:flex;align-items:center;justify-content:center;
      background:var(--ink);
      color:var(--paper);
      border-radius:999px;
      font-size:20px;
      box-shadow:0 4px 16px rgba(0,0,0,.22);
      z-index:260;
    }
    .modal .close:hover,
    .modal .close:active{
      color:var(--paper);
      background:var(--ink-soft);
    }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/marked@9/marked.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

// --- Data (loaded from ./data.json at runtime) ---
let POSTS         = [];
let WORKS         = [];
let CAT_LABEL     = { idea: "Idea", tech: "Tech", book: "Book", all: "All" };
let HERO          = { title: "", lede: "", icon: "", nowItems: [] };
let HERO_ICON     = "";
let FOOTER_LINKS  = { twitter: "", github: "" };
let TIMELINE      = { work: [], edu: [], side: [] };

function Masthead({ current, goTo }){
  return (
    <header className="masthead">
      <div className="brand">
        <div className="logo">komawari.</div>
        <div className="tagline">// portfolio & notebook</div>
      </div>
      <nav className="nav">
        {["Home","Blog","Works","Timeline"].map(n => (
          <a key={n} href="#" className={n===current?"active":""} onClick={e=>{e.preventDefault();goTo(n);}}>{n}</a>
        ))}
      </nav>
    </header>
  );
}

function LatestStrip({ posts, onOpen, goTo }){
  const latest = [...posts].sort((a,b)=> b.date.localeCompare(a.date))[0];
  if(!latest) return null;
  return (
    <button
      className="latest-strip"
      data-cat={latest.cat}
      onClick={()=>onOpen(latest)}
    >
      <span className="label">// LATEST</span>
      <h4>{latest.title}</h4>
      <span className="cat-tag"><span className="dot"></span>{CAT_LABEL[latest.cat]}</span>
      <span className="date">{latest.date}</span>
      <span className="arrow">→</span>
    </button>
  );
}

function Hero(){
  const icon = HERO.icon || HERO_ICON;
  return (
    <section className="hero">
      <div className="hero-intro">
        {icon && <img className="hero-icon" src={icon} alt="" />}
        <h1>
          <small>// INTRO</small>
          {HERO.title}
        </h1>
        <p className="lede">
          {HERO.lede}
        </p>
      </div>
      <div className="hero-now">
        <h4>// NOW</h4>
        <ul>
          {HERO.nowItems.map((it, i) => (
            <li key={i}><span className="k">{it.key}</span><span>{it.value}</span></li>
          ))}
        </ul>
      </div>
    </section>
  );
}

function FilterBar({ cat, setCat, q, setQ, counts }){
  const cats = [
    { key:"all",  label:"All" },
    { key:"idea", label:"Idea" },
    { key:"tech", label:"Tech" },
    { key:"book", label:"Book" }
  ];
  return (
    <div className="filter-bar">
      {cats.map(c=>(
        <button key={c.key} data-k={c.key} className={"cat-btn"+(cat===c.key?" active":"")} onClick={()=>setCat(c.key)}>
          <span className="dot"></span>
          {c.label}
          <span className="n">{String(counts[c.key]).padStart(2,"0")}</span>
        </button>
      ))}
      <div className="search-wrap">
        <span className="ico">⌕</span>
        <input placeholder="記事を検索..." value={q} onChange={e=>setQ(e.target.value)} />
      </div>
    </div>
  );
}

function Post({ p, onOpen, edgeR, edgeB }){
  const cls = ["post", p.size];
  if(edgeR) cls.push("edge-r");
  if(edgeB) cls.push("edge-b");
  const showHeroImg = p.size === "s-hero" && p.img;
  if(showHeroImg) cls.push("has-hero-img");
  return (
    <button className={cls.join(" ")} data-cat={p.cat} onClick={()=>onOpen(p)}>
      <div className="meta-top">
        <span className="cat-tag"><span className="dot"></span>{CAT_LABEL[p.cat]}</span>
        <span style={{display:"flex",alignItems:"center",gap:"6px"}}>
          {p.date}
        </span>
      </div>
      <h3>{p.title}</h3>
      <p className="excerpt">{p.excerpt}</p>
      <div className="foot">
        <div className="tags">{p.tags.map(t=><span key={t}>#{t}</span>)}</div>
        <span className="read">{p.read} →</span>
      </div>
      {showHeroImg && (
        <div className="hero-img" aria-hidden="true">
          <img src={p.img} alt="" />
        </div>
      )}
    </button>
  );
}

function BlogGrid({ posts, filtered, onOpen }){
  if (posts.length===0){
    return (
      <div className="blog-grid">
        <div className="post empty edge-r edge-b">
          <div className="b">記事が見つかりませんでした</div>
          <div className="s">// try different keywords</div>
        </div>
      </div>
    );
  }
  return (
    <div className={"blog-grid"+(filtered?" uniform":"")}>
      {posts.map(p => <Post key={p.id} p={p} onOpen={onOpen} />)}
    </div>
  );
}

function Works({ onOpen }){
  const items = WORKS;
  return (
    <div className="works">
      {items.map((it,i)=>(
        <div className="work" key={i} onClick={()=>onOpen(it)}>
          <div className="thumb">
            {it.img ? <img src={it.img} alt={it.t} /> : '[ thumbnail ]'}
          </div>
          <h4>{it.t}</h4>
          <div className="meta"><span>{it.y}</span><span>{it.k}</span></div>
        </div>
      ))}
    </div>
  );
}

function WorkModal({ work, onClose }){
  useEffect(()=>{
    if(!work) return;
    const h = e => { if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown", h);
    return ()=>window.removeEventListener("keydown", h);
  },[work,onClose]);
  if(!work) return null;
  return (
    <div className={"modal-bg open"} onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <button className="close" onClick={onClose}>✕</button>
        <span className="m-cat" style={{color:'var(--muted)'}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:'.1em'}}>WORKS</span>
        </span>
        <h2 style={{marginTop:8}}>{work.t}</h2>
        <div className="m-work-meta">
          <span>{work.y}</span>
          <span>{work.k}</span>
        </div>
        {work.img && (
          <div className="m-img">
            <img src={work.img} alt={work.t} />
          </div>
        )}
        {work.desc && (
          <div className="m-body" dangerouslySetInnerHTML={{__html:
            marked.parse(work.desc)
          }} />
        )}
        {work.url && (
          <a className="m-work-url" href={work.url} target="_blank" rel="noopener noreferrer">
            プロジェクトを見る →
          </a>
        )}
      </div>
    </div>
  );
}

function Timeline(){
  const renderRow = (r, i) => (
    <div className="tl-row" key={r.ep+i}>
      <div className="when">
        <span className="y">{r.year}</span>
        <span>{r.month}</span>
      </div>
      <div className="main">
        <h4>{r.title}</h4>
        <div className="role">{r.role} / <span className="co">{r.co}</span></div>
      </div>
      <div className="pg">{r.page}</div>
    </div>
  );

  return (
    <div className="timeline">
      <div className="tl-group">
        <div className="tl-group-head">
          <span>PART 1</span>
          <span className="t">本編 — Work</span>
        </div>
        {TIMELINE.work.map(renderRow)}
      </div>
      <div className="tl-group">
        <div className="tl-group-head">
          <span>PART 2</span>
          <span className="t">番外編 — Education</span>
        </div>
        {TIMELINE.edu.map(renderRow)}
      </div>
      <div className="tl-group">
        <div className="tl-group-head">
          <span>PART 3</span>
          <span className="t">特別編 — Side</span>
        </div>
        {TIMELINE.side.map(renderRow)}
      </div>
    </div>
  );
}

function Modal({ post, onClose }){
  useEffect(()=>{
    if(!post) return;
    const h = e => { if(e.key==="Escape") onClose(); };
    window.addEventListener("keydown", h);
    return ()=>window.removeEventListener("keydown", h);
  },[post,onClose]);
  if(!post) return null;
  return (
    <div className={"modal-bg open"} onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <button className="close" onClick={onClose}>✕</button>
        <span className="m-cat" data-cat={post.cat}>
          <span className="dot"></span>{CAT_LABEL[post.cat]}
        </span>
        <h2>{post.title}</h2>
        <div className="m-meta">
          <span>{post.date}</span>
          <span>{post.read}</span>
          <span>{post.tags.map(t=>"#"+t).join("  ")}</span>
        </div>
        {post.img && (
          <div className="m-img">
            <img src={post.img} alt={post.title} />
          </div>
        )}
        <div className="m-body" dangerouslySetInnerHTML={{__html:
          marked.parse(Array.isArray(post.body) ? post.body.join('\n\n') : (post.body||''))
        }} />
      </div>
    </div>
  );
}

function App(){
  const [cat, setCat] = useState("all");
  const [q, setQ] = useState("");
  const [open, setOpen] = useState(null);
  const [openWork, setOpenWork] = useState(null);
  const [current, setCurrent] = useState("Home");

  // モーダル表示中は背景ページのスクロールをロック
  useEffect(() => {
    const isModalOpen = !!(open || openWork);
    if (!isModalOpen) return;
    const scrollY = window.scrollY;
    const body = document.body;
    const prev = {
      position: body.style.position,
      top: body.style.top,
      width: body.style.width,
      overflow: body.style.overflow,
    };
    body.style.position = 'fixed';
    body.style.top = `-${scrollY}px`;
    body.style.width = '100%';
    body.style.overflow = 'hidden';
    return () => {
      body.style.position = prev.position;
      body.style.top = prev.top;
      body.style.width = prev.width;
      body.style.overflow = prev.overflow;
      window.scrollTo(0, scrollY);
    };
  }, [open, openWork]);

  const counts = useMemo(()=>({
    all: POSTS.length,
    idea: POSTS.filter(p=>p.cat==="idea").length,
    tech: POSTS.filter(p=>p.cat==="tech").length,
    book: POSTS.filter(p=>p.cat==="book").length,
  }),[]);

  const filtered = useMemo(()=>{
    return POSTS.filter(p=>{
      if(cat!=="all" && p.cat!==cat) return false;
      if(q){
        const s = (p.title+p.excerpt+p.tags.join(" ")).toLowerCase();
        if(!s.includes(q.toLowerCase())) return false;
      }
      return true;
    });
  }, [cat, q]);

  const goTo = (n) => {
    setCurrent(n);
    if(n === "Home"){
      window.scrollTo({top:0, behavior:"smooth"});
      return;
    }
    const idMap = { Blog:"sec-blog", Works:"sec-works", Timeline:"sec-timeline", Contact:"sec-contact" };
    const el = document.getElementById(idMap[n]);
    if(el){
      const y = el.getBoundingClientRect().top + window.scrollY - 20;
      window.scrollTo({top:y, behavior:"smooth"});
    }
  };

  return (
    <div className="page">
      <Masthead current={current} goTo={goTo} />

      <Hero />
      <LatestStrip posts={POSTS} onOpen={setOpen} goTo={goTo} />

      <div id="sec-blog" className="section-head">
        <h2><span className="sub">CH.01</span>Blog</h2>
        <div className="count">{String(filtered.length).padStart(2,"0")} / {String(POSTS.length).padStart(2,"0")}</div>
      </div>
      <FilterBar cat={cat} setCat={setCat} q={q} setQ={setQ} counts={counts} />
      <BlogGrid posts={filtered} filtered={cat!=="all" || q.length>0} onOpen={setOpen} />

      <div id="sec-works" className="section-head" style={{marginTop:64}}>
        <h2><span className="sub">CH.02</span>Works</h2>
        <div className="count">04</div>
      </div>
      <Works onOpen={setOpenWork} />

      <div id="sec-timeline" className="section-head" style={{marginTop:64}}>
        <h2><span className="sub">CH.03</span>Timeline</h2>
        <div className="count">2014 — NOW</div>
      </div>
      <Timeline />

      <footer id="sec-contact" className="foot-panel">
        <div className="links">
          <a href={FOOTER_LINKS.twitter||"#"} target={FOOTER_LINKS.twitter?"_blank":undefined} rel="noopener noreferrer">Twitter/X</a>
          <a href={FOOTER_LINKS.github||"#"} target={FOOTER_LINKS.github?"_blank":undefined} rel="noopener noreferrer">GitHub</a>
        </div>
        <div className="copy">© 2026 komawari.</div>
      </footer>

      <Modal post={open} onClose={()=>setOpen(null)} />
      <WorkModal work={openWork} onClose={()=>setOpenWork(null)} />
    </div>
  );
}

function bootstrap(data){
  POSTS        = data.posts        || [];
  WORKS        = data.works        || [];
  CAT_LABEL    = data.catLabel     || CAT_LABEL;
  HERO         = data.hero         || HERO;
  HERO_ICON    = (data.hero && data.hero.icon) || "";
  FOOTER_LINKS = data.footerLinks  || FOOTER_LINKS;
  TIMELINE     = data.timeline     || TIMELINE;
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}

fetch('./data.json', { cache: 'no-cache' })
  .then(r => {
    if (!r.ok) throw new Error('Failed to load data.json: ' + r.status);
    return r.json();
  })
  .then(bootstrap)
  .catch(err => {
    console.error(err);
    const root = document.getElementById('root');
    if (root) {
      root.innerHTML =
        '<div style="padding:40px;font-family:sans-serif;color:#b23a3a">' +
        'data.json の読み込みに失敗しました。<br>' +
        '<small style="color:#888">' + (err && err.message ? err.message : String(err)) + '</small>' +
        '</div>';
    }
  });
</script>
</body>
</html>
